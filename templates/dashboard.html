<!DOCTYPE html>
<html>
<head>

<title>DPE SAP VIM Control Center</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Outfit',sans-serif;
background:#04080f;
color:white;
margin:0;
padding:50px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.title{
font-size:26px;
font-weight:700;
}

.logout{
background:#ef4444;
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
cursor:pointer;
}

.panel{
background:#0c1525;
border:1px solid #1e3358;
padding:25px;
border-radius:14px;
margin-bottom:30px;
}

.date-input{
padding:10px;
border-radius:8px;
border:1px solid #1e3358;
background:#091220;
color:white;
margin-right:10px;
}

.process-btn{
background:linear-gradient(135deg,#0ea5e9,#0284c7);
border:none;
padding:10px 20px;
border-radius:8px;
color:white;
cursor:pointer;
}

.cards{
display:flex;
gap:20px;
margin-top:30px;
}

.card{
flex:1;
background:#0c1525;
border:1px solid #1e3358;
padding:30px;
border-radius:14px;
text-align:center;
}

.card h2{
font-size:42px;
margin:0;
}

.card button{
margin-top:15px;
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
}

.green{background:#10b981;color:white}
.red{background:#ef4444;color:white}

.chart-panel{
margin-top:40px;
background:#0c1525;
padding:25px;
border-radius:14px;
border:1px solid #1e3358;
}

</style>

</head>

<body>

<div class="header">

<div class="title">SAP VIM Control Center</div>

<a href="/logout">
<button class="logout">Logout</button>
</a>

</div>

{% if message %}
<div style="margin-bottom:20px;color:#10b981">{{ message }}</div>
{% endif %}

<div class="panel">

<form action="/process" method="POST">

<label>From</label>
<input type="date" name="start_date" class="date-input" required>

<label>To</label>
<input type="date" name="end_date" class="date-input" required>

<button class="process-btn">Start Email Processing</button>

</form>

</div>

<div class="cards">

<div class="card">

<h3>Incoming Documents</h3>

<h2>{{ incoming_count }}</h2>

<a href="/incoming">
<button class="green">Open Folder</button>
</a>

</div>

<div class="card">

<h3>Rejected Documents</h3>

<h2>{{ rejected_count }}</h2>

<a href="/rejected">
<button class="red">Open Folder</button>
</a>

</div>

</div>

<div class="chart-panel">

<h3>Processing Trend</h3>

<canvas id="trendChart"></canvas>

</div>

<script>

new Chart(document.getElementById("trendChart"),{

type:"line",

data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
datasets:[{
data:[5,7,4,9,6,8,3],
borderColor:"#10b981",
fill:false,
tension:0.4
}]
}

})

</script>

</body>
</html>
