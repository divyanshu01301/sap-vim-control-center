<!DOCTYPE html>
<html>
<head>

<title>SAP VIM Control Center</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2b46,#071a2c);
color:white;
margin:0;
padding:40px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
}

.primary{background:#00c6ff;color:white;}
.green{background:#00f5a0;color:black;}
.red{background:#ff3c5f;color:white;}

.cards{
display:flex;
gap:20px;
margin-top:30px;
}

.card{
flex:1;
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:12px;
text-align:center;
}

.card h2{
font-size:38px;
margin:0;
}

.panel{
margin-top:40px;
}

.date{
padding:10px;
border-radius:6px;
border:none;
margin-right:10px;
}

</style>

</head>

<body>

<div class="top">

<h2>Welcome {{ user }}</h2>

<a href="/logout">
<button class="red">Logout</button>
</a>

</div>

{% if message %}
<p style="color:#00f5a0">{{ message }}</p>
{% endif %}

<form action="/process" method="POST">

<input type="text" id="start_date" name="start_date" class="date" placeholder="Start date" required>

<input type="text" id="end_date" name="end_date" class="date" placeholder="End date" required>

<button class="primary">Start Processing</button>

</form>


<div class="cards">

<div class="card">

<h3>Incoming</h3>

<h2>{{ incoming_count }}</h2>

<a href="/incoming">
<button class="green">Open</button>
</a>

</div>

<div class="card">

<h3>Rejected</h3>

<h2>{{ rejected_count }}</h2>

<a href="/rejected">
<button class="red">Open</button>
</a>

</div>

</div>


<div class="panel">

<h3>Processing Trend</h3>

<canvas id="chart"></canvas>

</div>


<script>

flatpickr("#start_date",{dateFormat:"Y-m-d"});
flatpickr("#end_date",{dateFormat:"Y-m-d"});

new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
datasets:[{
data:[4,7,3,9,6,8,2],
borderColor:"#00f5a0",
fill:false
}]
}

})

</script>

</body>
</html>
