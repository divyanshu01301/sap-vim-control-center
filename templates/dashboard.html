<!DOCTYPE html>
<html>
<head>

<title>SAP VIM Control Center</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2b46,#071a2c);
color:white;
margin:0;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.primary{background:#00c6ff;color:white;}
.green{background:#00f5a0;color:black;}
red{background:#ff3c5f;color:white;}

.cards{
display:flex;
gap:25px;
margin-top:40px;
}

.card{
flex:1;
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:14px;
text-align:center;
}

.card h2{
font-size:42px;
margin:0;
}

.panel{
margin-top:50px;
}

</style>

</head>

<body>

<div class="header">

<h2>Welcome {{ user }}</h2>

<a href="/logout">
<button style="background:#ff3c5f;color:white">Logout</button>
</a>

</div>

{% if message %}
<p style="color:#00f5a0">{{ message }}</p>
{% endif %}

<form action="/process" method="POST">

<label>From</label>
<input type="date" name="start_date" required>

<label>To</label>
<input type="date" name="end_date" required>

<button class="primary">Start Email Processing</button>

</form>


<div class="cards">

<div class="card">

<h3>Incoming Documents</h3>

<h2>{{ incoming_count }}</h2>

<a href="/incoming">
<button class="green">Open Folder</button>
</a>

</div>

<div class="card">

<h3>Rejected Documents</h3>

<h2>{{ rejected_count }}</h2>

<a href="/rejected">
<button style="background:#ff3c5f;color:white">Open Folder</button>
</a>

</div>

</div>


<div class="panel">

<h3>Processing Trend</h3>

<canvas id="trend"></canvas>

</div>


<script>

new Chart(document.getElementById("trend"),{

type:"line",

data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
datasets:[{
data:[3,7,4,9,6,8,5],
borderColor:"#00f5a0",
fill:false,
tension:0.4
}]
}

})

</script>

</body>
</html>
