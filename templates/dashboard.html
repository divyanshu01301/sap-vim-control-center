<!DOCTYPE html>
<html>
<head>

<title>SAP VIM Control Center</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2b46,#071a2c);
color:white;
margin:0;
padding:40px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
}

.primary{background:#00c6ff;color:white;}
.green{background:#00f5a0;color:black;}
.red{background:#ff3c5f;color:white;}

.cards{
display:flex;
gap:20px;
margin-top:30px;
}

.card{
flex:1;
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:12px;
text-align:center;
}

.card h2{
font-size:38px;
margin:0;
}

.panel{
margin-top:40px;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.logs{
background:#041522;
padding:20px;
height:250px;
overflow:auto;
font-family:monospace;
color:#00f5a0;
}

</style>

</head>

<body>

<div class="top">

<h2>Welcome {{ user }}</h2>

<a href="/logout">
<button class="red">Logout</button>
</a>

</div>

{% if message %}
<p style="color:#00f5a0">{{ message }}</p>
{% endif %}

<form action="/process" method="POST">

<label>From</label>
<input type="date" name="start_date" required>

<label>To</label>
<input type="date" name="end_date" required>

<button class="primary">Start Processing</button>

</form>

<div class="cards">

<div class="card">
<h3>Incoming</h3>
<h2>{{ incoming_count }}</h2>
<a href="/incoming"><button class="green">Open</button></a>
</div>

<div class="card">
<h3>Rejected</h3>
<h2>{{ rejected_count }}</h2>
<a href="/rejected"><button class="red">Open</button></a>
</div>

</div>

<div class="panel">

<div>

<h3>Processing Trend</h3>

<canvas id="chart"></canvas>

</div>

<div>

<h3>Live Logs</h3>

<div class="logs" id="logs"></div>

</div>

</div>

<script>

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
datasets:[{
data:[4,7,3,9,6,8,2],
borderColor:"#00f5a0",
fill:false
}]
}
});

function updateLogs(){

fetch("/api/logs")
.then(r=>r.json())
.then(d=>{
document.getElementById("logs").innerHTML =
d.logs.join("<br>")
})

}

updateLogs()
setInterval(updateLogs,3000)

</script>

</body>
</html>
