<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPE Technologies — Secure Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Outfit',sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#04080f;
background-image:
radial-gradient(ellipse 700px 500px at 50% 0%,rgba(14,165,233,.09) 0%,transparent 70%),
radial-gradient(ellipse 400px 400px at 80% 80%,rgba(16,185,129,.05) 0%,transparent 60%);
color:#e2e8f0;
}

body::before{
content:'';
position:fixed;
inset:0;
pointer-events:none;
background-image:
linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
background-size:60px 60px;
}

.wrap{
position:relative;
z-index:1;
width:380px;
animation:rise .5s ease
}

@keyframes rise{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

.top-badge{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
margin-bottom:28px
}

.logo-mark{
width:40px;
height:40px;
border-radius:12px;
background:linear-gradient(135deg,#0ea5e9,#10b981);
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
font-weight:800;
color:#fff;
box-shadow:0 8px 24px rgba(14,165,233,.3)
}

.brand-name{
font-size:18px;
font-weight:800;
color:#fff;
letter-spacing:-.3px
}

.brand-name span{color:#0ea5e9}

.brand-tag{
font-size:10px;
font-family:'DM Mono',monospace;
color:#475569;
letter-spacing:1.5px;
text-transform:uppercase
}

.card{
background:#0c1525;
border:1px solid #14243f;
border-radius:18px;
padding:36px 36px 32px;
box-shadow:0 24px 64px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03);
position:relative;
overflow:hidden
}

.card::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
height:2px;
background:linear-gradient(90deg,transparent,#0ea5e9,#10b981,transparent)
}

.card-title{
font-size:20px;
font-weight:800;
color:#fff;
letter-spacing:-.4px;
margin-bottom:5px
}

.card-sub{
font-size:13px;
color:#475569;
margin-bottom:28px
}

label{
display:block;
font-size:10px;
font-weight:600;
text-transform:uppercase;
letter-spacing:1.2px;
color:#475569;
font-family:'DM Mono',monospace;
margin-bottom:6px
}

input{
width:100%;
padding:11px 14px;
border-radius:9px;
border:1px solid #1e3358;
background:rgba(255,255,255,.03);
color:#e2e8f0;
font-size:14px;
font-family:'Outfit',sans-serif;
outline:none;
transition:border-color .2s;
margin-bottom:16px
}

input:focus{
border-color:rgba(14,165,233,.5);
background:rgba(14,165,233,.04)
}

input::placeholder{color:#334155}

.btn-login{
width:100%;
padding:13px;
border-radius:9px;
border:none;
background:linear-gradient(135deg,#0ea5e9,#0284c7);
color:#fff;
font-family:'Outfit',sans-serif;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:all .2s;
box-shadow:0 4px 16px rgba(14,165,233,.3);
display:flex;
align-items:center;
justify-content:center;
gap:8px;
margin-top:6px
}

.btn-login:hover{
transform:translateY(-1px);
box-shadow:0 8px 24px rgba(14,165,233,.4)
}

.error{
color:#ef4444;
font-size:13px;
margin-bottom:10px
}

.footer{
text-align:center;
margin-top:18px;
font-size:11px;
color:#334155;
font-family:'DM Mono',monospace
}

</style>
</head>

<body>

<div class="wrap">

<div class="top-badge">

<div class="logo-mark">V</div>

<div>
<div class="brand-name">DPE<span>.</span> SAP VIM</div>
<div class="brand-tag">Email Processor</div>
</div>

</div>

<div class="card">

<div class="card-title">Welcome back</div>
<div class="card-sub">Sign in to access the control center</div>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST">

<label>Email address</label>
<input type="text" name="email" placeholder="your@email.com" required>

<label>Password</label>
<input type="password" name="password" placeholder="••••••••" required>

<button class="btn-login">
Sign in securely →
</button>

</form>

</div>

<div class="footer">
DPE Technologies · SAP VIM Control Center
</div>

</div>

</body>
</html>
