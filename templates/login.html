<!DOCTYPE html>
<html lang="en">
<head>
    <title>DPE Technologies | Secure Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:     #060d18;
            --panel:  #0b1628;
            --border: #132240;
            --accent: #00e5ff;
            --text:   #ccd6f6;
            --muted:  #4a6080;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            background-image: radial-gradient(ellipse 70% 50% at 50% -10%,
                rgba(0,180,255,0.10) 0%, transparent 70%);
            color: var(--text);
        }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 48px 40px 44px;
            width: 340px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }
        .brand {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.5px;
            margin-bottom: 32px;
        }
        .brand span { color: var(--accent); }
        .brand small {
            display: block;
            font-size: 11px;
            font-weight: 400;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
            font-family: 'JetBrains Mono', monospace;
        }
        input {
            width: 100%;
            padding: 11px 14px;
            margin-bottom: 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--text);
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            transition: border-color .2s;
        }
        input:focus { border-color: rgba(0,229,255,.4); }
        input::placeholder { color: var(--muted); }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: #000;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: background .2s, transform .1s;
            margin-top: 4px;
        }
        button:hover { background: #33eeff; }
        button:active { transform: scale(.98); }
        .error {
            color: #ff5c7a;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 14px;
            padding: 9px 12px;
            background: rgba(255,60,95,.08);
            border: 1px solid rgba(255,60,95,.2);
            border-radius: 6px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">
        DPE<span>.</span> SAP VIM
        <small>Email Processor</small>
    </div>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <input type="text"     name="email"    placeholder="Email address" required autocomplete="email">
        <input type="password" name="password" placeholder="Password"      required autocomplete="current-password">
        <button type="submit">Secure Login</button>
    </form>
</div>
</body>
</html>
