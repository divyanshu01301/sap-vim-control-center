<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incoming — SAP VIM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#04080f;--surface:#080f1c;--panel:#0c1525;--border:#14243f;--border2:#1e3358;--accent:#0ea5e9;--accent2:#38bdf8;--green:#10b981;--green2:#34d399;--red:#f43f5e;--text:#e2e8f0;--text2:#94a3b8;--text3:#475569;--mono:'DM Mono',monospace;--sans:'Outfit',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse 700px 300px at 50% -40px,rgba(14,165,233,.05) 0%,transparent 70%)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:58px;background:rgba(4,8,15,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--green));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;box-shadow:0 4px 14px rgba(14,165,233,.3)}
.nav-title{font-size:15px;font-weight:700;color:#fff}.nav-title span{color:var(--accent)}
.nav-sub{font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px}
.btn-back{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--text2);background:transparent;border:1px solid var(--border);border-radius:7px;padding:6px 14px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-back:hover{color:var(--accent);border-color:rgba(14,165,233,.3);background:rgba(14,165,233,.05)}
main{max-width:1100px;margin:0 auto;padding:28px 32px 60px}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px}
.page-header h1{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.4px}
.page-header p{font-size:13px;color:var(--text3);margin-top:3px}
.count-badge{font-family:var(--mono);font-size:12px;color:var(--text2);background:var(--panel);border:1px solid var(--border);padding:5px 14px;border-radius:20px}
.search-wrap{position:relative;margin-bottom:16px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
#si{width:100%;padding:10px 14px 10px 38px;background:var(--panel);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .2s}
#si:focus{border-color:rgba(14,165,233,.4)}
#si::placeholder{color:var(--text3)}
.table-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{padding:12px 18px;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-family:var(--mono);font-weight:500;background:var(--surface);border-bottom:1px solid var(--border);text-align:left}
thead th:last-child{text-align:right}
.fr{transition:background .15s;border-bottom:1px solid rgba(20,36,63,.6)}
.fr:last-child{border-bottom:none}
.fr:hover{background:rgba(14,165,233,.04)}
.fr td{padding:14px 18px;vertical-align:middle}
.fi{font-size:18px;width:36px}
.fn{font-family:var(--mono);font-size:12px;color:var(--text);font-weight:500}
.fm{font-size:11px;color:var(--text3);margin-top:2px}
.fs{font-family:var(--mono);font-size:11px;color:var(--text3);white-space:nowrap}
.fd{font-family:var(--mono);font-size:11px;color:var(--text3);white-space:nowrap}
.fa{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.bp{font-family:var(--sans);font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;cursor:pointer;background:rgba(14,165,233,.1);color:var(--accent2);border:1px solid rgba(14,165,233,.2);transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.bp:hover{background:rgba(14,165,233,.2)}
.bd{font-family:var(--sans);font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;cursor:pointer;background:rgba(16,185,129,.1);color:var(--green2);border:1px solid rgba(16,185,129,.2);transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.bd:hover{background:rgba(16,185,129,.2)}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(2,4,10,.85);backdrop-filter:blur(8px);animation:fadeIn .2s ease}
.modal-overlay.open{display:flex;align-items:center;justify-content:center;padding:24px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--panel);border:1px solid var(--border2);border-radius:16px;width:90vw;max-width:960px;height:88vh;display:flex;flex-direction:column;box-shadow:0 40px 120px rgba(0,0,0,.7);animation:slideUp .22s ease;overflow:hidden}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.mh{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.mf{font-family:var(--mono);font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%}
.mf::before{content:'📄';font-size:14px}
.ma{display:flex;align-items:center;gap:8px;flex-shrink:0}
.bdm{font-family:var(--sans);font-size:12px;font-weight:600;padding:6px 14px;border-radius:7px;cursor:pointer;text-decoration:none;background:rgba(16,185,129,.12);color:var(--green2);border:1px solid rgba(16,185,129,.2);transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.bc{width:32px;height:32px;border-radius:7px;border:none;cursor:pointer;background:rgba(244,63,94,.1);color:#fb7185;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.bc:hover{background:rgba(244,63,94,.2)}
.mb{flex:1;position:relative;overflow:hidden;background:#020810;display:flex;align-items:center;justify-content:center}
.mock-pdf{text-align:center;color:var(--text3);font-family:var(--mono);font-size:13px}
.mock-pdf-icon{font-size:64px;margin-bottom:16px;opacity:.4}
.mhint{position:absolute;bottom:14px;right:18px;font-family:var(--mono);font-size:10px;color:var(--text3);pointer-events:none}
</style>
</head>
<body>
<nav>
  <div class="nav-brand">
    <div class="nav-logo">V</div>
    <div>
      <div class="nav-title">DPE<span>.</span> SAP VIM</div>
      <div class="nav-sub">Email Processor</div>
    </div>
  </div>
  <a href="#" class="btn-back">← Dashboard</a>
</nav>
<main>
  <div class="page-header">
    <div>
      <h1>📥 Incoming Invoices</h1>
      <p>7 documents stored and ready for SAP VIM import</p>
    </div>
    <div class="count-badge">7 files</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="si" placeholder="Search files by name…" oninput="filterFiles()">
  </div>
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th style="width:44px"></th>
          <th>File Name</th>
          <th>Size</th>
          <th>Modified</th>
          <th style="text-align:right">Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="mo" onclick="handleClick(event)">
  <div class="modal-box">
    <div class="mh">
      <div class="mf" id="mf">Loading…</div>
      <div class="ma">
        <a class="bdm" href="#">↓ Download</a>
        <button class="bc" onclick="close()">✕</button>
      </div>
    </div>
    <div class="mb">
      <div class="mock-pdf">
        <div class="mock-pdf-icon">📄</div>
        <div>PDF preview renders here in production</div>
        <div style="margin-top:8px;font-size:11px;opacity:.6">via &lt;iframe src="/file/incoming/filename.pdf"&gt;</div>
      </div>
      <div class="mhint">Press Esc to close</div>
    </div>
  </div>
</div>

<script>
const files=[
  {name:"INV-2024-0091_Supplier_A.pdf",size:"128",date:"04 Mar 2026 09:12"},
  {name:"Rechnung_March_2026_DPE.pdf",size:"245",date:"04 Mar 2026 09:12"},
  {name:"Tax_Invoice_99812_March.pdf",size:"89",date:"04 Mar 2026 09:13"},
  {name:"BILL-TO-DPE-0033_Utilities.pdf",size:"312",date:"04 Mar 2026 09:13"},
  {name:"proforma_2026_q1_logistics.pdf",size:"156",date:"04 Mar 2026 09:14"},
  {name:"Invoice_March_Consulting.pdf",size:"203",date:"04 Mar 2026 09:14"},
  {name:"Factura_2026_0118_ES.pdf",size:"178",date:"04 Mar 2026 09:15"},
];
const tbody=document.getElementById("tbody");
files.forEach(f=>{
  const tr=document.createElement("tr");
  tr.className="fr";tr.dataset.name=f.name.toLowerCase();
  tr.innerHTML=`<td class="fi">📄</td><td><div class="fn">${f.name}</div><div class="fm">PDF Document</div></td><td class="fs">${f.size} KB</td><td class="fd">${f.date}</td><td><div class="fa"><button class="bp" onclick="openPreview('${f.name}')">👁 Preview</button><a class="bd" href="#">↓ Download</a></div></td>`;
  tbody.appendChild(tr);
});
function filterFiles(){const q=document.getElementById("si").value.toLowerCase();document.querySelectorAll(".fr").forEach(r=>{r.style.display=r.dataset.name.includes(q)?"":"none"});}
function openPreview(name){document.getElementById("mf").textContent=name;document.getElementById("mo").classList.add("open");document.body.style.overflow="hidden";}
function close(){document.getElementById("mo").classList.remove("open");document.body.style.overflow="";}
function handleClick(e){if(e.target===document.getElementById("mo"))close();}
document.addEventListener("keydown",e=>{if(e.key==="Escape")close();});
</script>
</body>
</html>
