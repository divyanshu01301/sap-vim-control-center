<!DOCTYPE html>
<html>
<head>

<title>{{ title }}</title>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2b46,#071a2c);
color:white;
padding:40px;
}

.file{
background:rgba(255,255,255,0.05);
padding:20px;
margin-bottom:15px;
border-radius:10px;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

.preview{background:#00c6ff;color:white;}
.download{background:#00f5a0;color:black;}

.modal{
display:none;
position:fixed;
top:5%;
left:10%;
width:80%;
height:85%;
background:#111;
border-radius:10px;
}

.modal iframe{
width:100%;
height:100%;
border:none;
}

</style>

</head>

<body>

<h2>{{ title }}</h2>

<a href="/dashboard">← Back</a>

<br><br>

{% for file in files %}

<div class="file">

<b>{{ file.name }}</b>

<br>

Size: {{ file.size }} KB

<br><br>

<button class="preview"
onclick="preview('{{ folder }}','{{ file.name }}')">
Preview
</button>

<a href="/download/{{ folder }}/{{ file.name }}">
<button class="download">Download</button>
</a>

</div>

{% endfor %}

<div class="modal" id="modal">
<iframe id="frame"></iframe>
</div>

<script>

function preview(folder,file){

document.getElementById("frame").src="/file/"+folder+"/"+file

document.getElementById("modal").style.display="block"

}

document.getElementById("modal").onclick=function(){

this.style.display="none"

}

</script>

</body>
</html>
