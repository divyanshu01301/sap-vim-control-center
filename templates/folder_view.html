<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2b46, #071a2c);
            color: white;
            padding: 40px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h2 {
            margin: 0;
            font-weight: 500;
        }

        .back {
            background: #ff3c5f;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        .file-card {
            background: rgba(255,255,255,0.05);
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
        }

        .file-name {
            font-weight: 600;
            font-size: 15px;
        }

        .meta {
            font-size: 13px;
            opacity: 0.75;
            margin-top: 5px;
        }

        .actions {
            margin-top: 12px;
        }

        button {
            padding: 7px 14px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            margin-right: 8px;
            font-weight: 500;
        }

        .preview {
            background: #00c6ff;
            color: white;
        }

        .download {
            background: #00f5a0;
            color: black;
        }

        .pagination {
            margin-top: 30px;
        }

        .pagination a {
            margin-right: 10px;
            color: #00f5a0;
            text-decoration: none;
        }

        /* ===== MODAL ===== */

        .modal {
            display: none;
            position: fixed;
            top: 5%;
            left: 10%;
            width: 80%;
            height: 85%;
            background: #111;
            z-index: 9999;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .modal-header {
            height: 50px;
            background: #1b2c3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-weight: 500;
        }

        .modal iframe {
            width: 100%;
            height: calc(100% - 50px);
            border: none;
        }

        .close-btn {
            cursor: pointer;
            font-size: 18px;
        }

    </style>
</head>

<body>

<div class="top-bar">
    <h2>{{ title }} (Total Files: {{ total_files }})</h2>

    <a href="/dashboard">
        <button class="back">← Back to Dashboard</button>
    </a>
</div>

{% if files %}
{% for file in files %}

<div class="file-card">

    <div class="file-name">{{ file.name }}</div>

    <div class="meta">
        Size: {{ file.size }} KB |
        Modified: {{ file.timestamp }}
    </div>

    <div class="actions">

        <!-- PREVIEW BUTTON -->

        <button class="preview"
            onclick="openPreview('{{ folder }}','{{ file.name }}')">
            Preview
        </button>

        <!-- DOWNLOAD BUTTON -->

        <a href="/download/{{ folder }}/{{ file.name | urlencode }}">
            <button class="download">Download</button>
        </a>

    </div>

</div>

{% endfor %}
{% else %}
<p>No documents found.</p>
{% endif %}

<!-- PAGINATION -->

<div class="pagination">
{% for i in range(1, total_pages + 1) %}
<a href="?page={{ i }}">Page {{ i }}</a>
{% endfor %}
</div>


<!-- PREVIEW MODAL -->

<div class="modal" id="previewModal">

    <div class="modal-header">
        <span>PDF Preview</span>
        <span class="close-btn" onclick="closePreview()">✖</span>
    </div>

    <iframe id="previewFrame"></iframe>

</div>


<script>

function openPreview(folder, filename) {

    document.getElementById("previewFrame").src =
        "/file/" + folder + "/" + encodeURIComponent(filename);

    document.getElementById("previewModal").style.display = "block";

}

function closePreview() {

    document.getElementById("previewModal").style.display = "none";
    document.getElementById("previewFrame").src = "";

}

</script>

</body>
</html>
